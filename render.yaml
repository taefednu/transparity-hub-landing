services:
  # Backend API
  - type: web
    name: transparity-hub-backend
    env: node
    plan: free
    buildCommand: cd backend && npm install
    startCommand: cd backend && npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: FRONTEND_URL
        sync: false  # Установите вручную URL вашего фронтенда

  # Frontend (опционально, если хотите деплоить на Render)
  - type: web
    name: transparity-hub-frontend
    env: static
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: frontend/build
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

